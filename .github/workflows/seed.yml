name: Seed do Banco de Dados

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Digite CONFIRMAR para executar (apaga e recria todos os dados)"
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'CONFIRMAR' }}

    steps:
      - name: Executar seed via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            CONTAINER=$(docker ps --filter "name=rzmxpm" --format "{{.Names}}" | head -1)
            echo "Container: $CONTAINER"
            docker exec $CONTAINER node_modules/.bin/tsx prisma/seed.ts
